<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Pokedex</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
        rel="stylesheet">
</head>

<body>


    <header>
        <div class="content-limiter">
            <div class="div-pokeball-poketext">
                <img class="pokeball-img-header" src="./img/pokeball.png" alt="">
                <h1>Pokedex</h1>
            </div>

            <input onkeyup="searchPokemon()" id="searchInput" type="text">

        </div>

    </header>

    <div class="hidden" id="loading"> <img id="loadingBall" src="./img/pokeball.png" alt=""></div>

    <div class="content-limiter">
        <div id="pokedex"></div>
    </div>


    <div onclick="closeOverlay()" class="d-none" id="overlay">
        <div onclick="event.stopPropagation()" id="overlayContent">
            <h2 id="overlayName">Pokemon Name</h2>
            <img id="overlayImg" src="" alt="">
            <div class="overlay-tabs">
                <button onclick="showMainTab()">main</button>
                <button onclick="showStatsTab()">stats</button>
                <button onclick="showEvoTab()">evo chain</button>
            </div>

            <div id="overlayTabContent"></div>

        </div>

    </div>

    <div class="div-load-btn">
        <button id="loadBtn" class="load-btn" onclick="loadMorePokemon()">Load more</button>
    </div>

    <script src="script.js"></script>
</body>

</html>
